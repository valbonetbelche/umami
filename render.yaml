services:
  - type: web
    name: umami
    env: docker
    # repo omitted — Render uses the Git repo this Blueprint is deployed from
    region: oregon # optional (defaults to oregon)
    plan: free
    branch: main
    numInstances: 1
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: umami-db
          property: connectionString
      - key: HASH_SALT
        generateValue: true

databases:
  - name: umami-db
    plan: free
    databaseName: umami
    user: umami
